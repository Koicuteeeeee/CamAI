version: '3.8'
services:
  minio:
    image: minio/minio:latest
    container_name: CamAI_MinIO
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./infra_data/minio_data:/data
    command: server /data --console-address ":9001"