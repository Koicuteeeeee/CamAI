version: '3.8'

services:
  # Object Storage (MinIO)
  minio:
    image: minio/minio:latest
    container_name: CamAI_MinIO
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./infra_data/minio_data:/data
    command: server /data --console-address ":9001"

  # Database for Keycloak
  keycloak-db:
    image: postgres:16
    container_name: CamAI_Keycloak_DB
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - ./infra_data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IAM Service (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: CamAI_Keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: password123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_FEATURES: token-exchange
      KC_HTTP_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      keycloak-db:
        condition: service_healthy